<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Cipher Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Merriweather', serif;
            margin: 50px;
            background-color: #f5f0e6; /* Warm paper-like background */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            display: flex;
            flex-direction: row;
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 900px;
            align-items: center;
            justify-content: space-between;
        }
        .input-section, .result-section {
            width: 40%;
        }
        input, select {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #resultBar {
            padding: 15px;
            margin-top: 20px;
            background-color: #fafafa;
            border: 1px solid #ccc;
            border-radius: 5px;
            min-height: 50px;
            font-size: 1.2em;
            color: #222;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-section">
            <h2>Enter Text</h2>
                        <input type="text" id="cipherText" placeholder="Enter your text here">
            <label for="cipherType">Choose Cipher</label>
            <select id="cipherType">
    <option value="doubleY">Double Y Cipher</option>
    <option value="caesar">Caesar Cipher</option>
    <option value="vigenere">Vigenère Cipher</option>
    <option value="atbash">Atbash Cipher</option>
    <option value="railfence">Rail Fence Cipher</option>
    <option value="playfair">Playfair Cipher</option>
</select>
            <label for="action">Action</label>
            <select id="action">
                <option value="encrypt">Encrypt</option>
                <option value="decrypt">Decrypt</option>
            </select>
        </div>
        <div class="result-section">
            <h2>Result</h2>
            <div id="resultBar">Result will appear here</div>
        </div>
    </div>
    <script src="cipher.js_"></script>
</body>
</html>
